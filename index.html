<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUBLISTAR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <main class="game-shell">
    <section id="phone" class="phone">
      <div class="notch"></div>
      <div class="statusbar">
        <span>PUBLISTAR OS</span>
        <span id="status-date">Jour 1</span>
      </div>

      <div id="topbar" class="topbar"></div>

      <div id="screen" class="screen"></div>

      <div class="dock">
        <button class="dock-btn" id="homeBtn">Accueil</button>
        <button class="dock-btn" id="saveBtn">Sauver</button>
        <button class="dock-btn" id="resetBtn">Reset</button>
      </div>
    </section>

    <aside class="side-panel">
      <div class="panel-card">
        <h2>PUBLISTAR</h2>
        <p>
          Simulateur d'artiste : musique, plateformes, crypto, entreprises,
          réseaux sociaux, manager et Top 100.
        </p>
      </div>
      <div class="panel-card">
        <h3>Raccourcis</h3>
        <div class="shortcut-list">
          <button class="shortcut" data-app="Publistar">Créer un son</button>
          <button class="shortcut" data-app="Calendrier">Avancer le temps</button>
          <button class="shortcut" data-app="Crypto">Trader</button>
          <button class="shortcut" data-app="Gestion">Entreprises</button>
        </div>
      </div>
      <div class="panel-card">
        <h3>Conseil</h3>
        <p id="adviceText">Sors un premier morceau pour lancer ta carrière.</p>
      </div>
    </aside>
  </main>

  <script src="game.js"></script>
</body>
</html>
